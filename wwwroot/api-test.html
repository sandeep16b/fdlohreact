<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .result { margin: 20px 0; padding: 10px; border: 1px solid #ccc; background: #f9f9f9; }
        .success { border-color: #4CAF50; background: #e8f5e9; }
        .error { border-color: #f44336; background: #ffebee; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Asset Manager API Test</h1>
    
    <button onclick="testLookupData()">Test Lookup Data API</button>
    <button onclick="testSearchAPI()">Test Search API</button>
    <button onclick="clearResults()">Clear Results</button>
    
    <div id="results"></div>

    <script>
        const baseURL = window.location.origin;
        
        function addResult(title, content, isError = false) {
            const resultsDiv = document.getElementById('results');
            const resultDiv = document.createElement('div');
            resultDiv.className = `result ${isError ? 'error' : 'success'}`;
            resultDiv.innerHTML = `<h3>${title}</h3><pre>${content}</pre>`;
            resultsDiv.appendChild(resultDiv);
        }
        
        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }
        
        async function testLookupData() {
            try {
                addResult('Testing Lookup Data API...', 'Making request to /api/receivablereport/lookup-data');
                
                const response = await fetch(`${baseURL}/api/receivablereport/lookup-data`);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                addResult('✅ Lookup Data API Success', JSON.stringify(data, null, 2));
                
            } catch (error) {
                addResult('❌ Lookup Data API Error', error.message, true);
                console.error('Lookup Data API Error:', error);
            }
        }
        
        async function testSearchAPI() {
            try {
                addResult('Testing Search API...', 'Making request to /api/receivablereport/search');
                
                const searchCriteria = {
                    organizationCode: null,
                    locationCode: null,
                    orderStatus: null,
                    createdDateFrom: null,
                    createdDateTo: null,
                    createdBy: null,
                    includeDeleted: false,
                    pageNumber: 1,
                    pageSize: 10,
                    sortBy: 'CreatedDate',
                    sortDirection: 'DESC'
                };
                
                const response = await fetch(`${baseURL}/api/receivablereport/search`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(searchCriteria)
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                addResult('✅ Search API Success', JSON.stringify(data, null, 2));
                
            } catch (error) {
                addResult('❌ Search API Error', error.message, true);
                console.error('Search API Error:', error);
            }
        }
        
        // Auto-test on page load
        window.onload = function() {
            addResult('API Test Page Loaded', `Base URL: ${baseURL}`);
        };
    </script>
</body>
</html>
